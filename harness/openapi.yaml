openapi: 3.0.3
info:
  title: Comparatif modes de garde — calculate
  description: |
    API harness pour brancher le moteur TypeScript (GARDE-016) sur une **Custom GPT Action**
    ou tout client HTTP. Le corps de requête est un objet **ScenarioInput** validé par Zod (GARDE-020).
    Réponses **200** : `ScenarioResult` avec `snapshot`, `trace`, `warnings`, `uncertainty`, **`meta`**, **`limitationHints`** (GARDE-026 / GARDE-022).
    Option **`incomeTax`** sur le corps : estimation IR / TMI (barème versionné, GARDE-019) ; voir schéma JSON.
    Schéma JSON : `GET /v1/scenario/schema` ou fichier `harness/scenario-input.schema.json` (GARDE-021).
    Le **`snapshot`** inclut les échos revenus foyer (`householdGrossSalary*`, `householdNetSalary*`, `householdIncomeAfterIncomeTax*`) lorsque `incomeTax` est renseigné.
    Si le serveur est configuré avec **`HARNESS_API_KEY`**, envoyer **`X-Api-Key`** ou **`Authorization: Bearer`** (GARDE-025).
  version: 1.3.0
servers:
  - url: http://127.0.0.1:8787
    description: Serveur de développement (`bun run harness:serve`)
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Santé du service
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/scenario/schema:
    get:
      operationId: getScenarioInputSchema
      summary: JSON Schema du corps `ScenarioInput` (draft 2020-12)
      responses:
        "200":
          description: Schéma JSON
          content:
            application/schema+json:
              schema:
                type: object
                additionalProperties: true
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/calculate:
    post:
      operationId: calculateScenario
      summary: Calcule un scénario (brut, CMG, crédit, RAC, incertitude)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                **ScenarioInput** : household, brutInput (union discriminée par `mode`), cmg, options taxCredit / baseline / **incomeTax** (GARDE-019), etc.
              additionalProperties: true
            examples:
              nounou:
                $ref: "#/components/examples/nounouDomicile"
      responses:
        "200":
          description: Résultat `ScenarioResult`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioResult"
        "400":
          description: Corps invalide ou JSON mal formé
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: JSON objet mais `ScenarioInput` invalide (Zod)
          content:
            application/json:
              schema:
                type: object
                required: [error, issues]
                properties:
                  error:
                    type: string
                    example: validation_failed
                  issues:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: array
                          items:
                            oneOf:
                              - type: string
                              - type: integer
                        code:
                          type: string
                        message:
                          type: string
        "500":
          description: Erreur interne
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
components:
  schemas:
    ScenarioSnapshot:
      type: object
      description: Agrégat financier principal (brut garde, aides, crédit d’impôt, RAC, revenus foyer déclarés).
      required:
        - mode
        - monthlyBrutEur
        - annualBrutEur
        - monthlyBrutTaxCreditAssietteEur
        - annualBrutTaxCreditAssietteEur
        - monthlyCmgEur
        - annualCmgEur
        - cmgStatus
        - annualTaxCreditEur
        - taxCreditKind
        - netHouseholdBurdenAnnualEur
        - netHouseholdBurdenMonthlyEur
        - disposableIncomeMonthlyEur
        - employerSupportDeltaAnnualEur
        - employerSupportIsComparisonScenario
        - householdGrossSalaryAnnualEur
        - householdGrossSalaryMonthlyEur
        - householdNetSalaryAnnualEur
        - householdNetSalaryMonthlyEur
        - householdIncomeAfterIncomeTaxAnnualEur
        - householdIncomeAfterIncomeTaxMonthlyEur
        - estimatedIncomeTaxGrossAnnualEur
        - estimatedIncomeTaxNetAfterDecoteAnnualEur
        - marginalIncomeTaxRate
        - incomeTaxQuotientEur
      properties:
        mode:
          type: string
          enum:
            - nounou_domicile
            - nounou_partagee
            - assistante_maternelle
            - mam
            - creche_publique
            - creche_privee
            - creche_inter_entreprises
        monthlyBrutEur: { type: number }
        annualBrutEur: { type: number }
        monthlyBrutTaxCreditAssietteEur: { type: number }
        annualBrutTaxCreditAssietteEur: { type: number }
        monthlyCmgEur: { type: number }
        annualCmgEur: { type: number }
        cmgStatus:
          type: string
          enum: [ok, ineligible, unsupported]
        annualTaxCreditEur: { type: number }
        taxCreditKind:
          type: string
          enum: [garde_hors_domicile, emploi_domicile]
        netHouseholdBurdenAnnualEur: { type: number }
        netHouseholdBurdenMonthlyEur: { type: number }
        disposableIncomeMonthlyEur: { type: number, nullable: true }
        employerSupportDeltaAnnualEur: { type: number, nullable: true }
        employerSupportIsComparisonScenario:
          type: boolean
          description: >
            true si déclaré + référence employeur sont tous deux renseignés : l’écart
            employerSupportDeltaAnnualEur est comparatif et ne modifie pas netHouseholdBurden*.
        householdGrossSalaryAnnualEur: { type: number, nullable: true }
        householdGrossSalaryMonthlyEur: { type: number, nullable: true }
        householdNetSalaryAnnualEur: { type: number, nullable: true }
        householdNetSalaryMonthlyEur: { type: number, nullable: true }
        householdIncomeAfterIncomeTaxAnnualEur: { type: number, nullable: true }
        householdIncomeAfterIncomeTaxMonthlyEur: { type: number, nullable: true }
        estimatedIncomeTaxGrossAnnualEur: { type: number, nullable: true }
        estimatedIncomeTaxNetAfterDecoteAnnualEur: { type: number, nullable: true }
        marginalIncomeTaxRate: { type: number, nullable: true }
        incomeTaxQuotientEur: { type: number, nullable: true }
    ScenarioResult:
      type: object
      required:
        - snapshot
        - trace
        - warnings
        - uncertainty
        - meta
        - limitationHints
        - incomeTaxDisposableHintsFr
      properties:
        snapshot:
          $ref: "#/components/schemas/ScenarioSnapshot"
        trace:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items: { type: string }
        uncertainty:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
        limitationHints:
          type: array
          items: { type: object, additionalProperties: true }
        incomeTaxDisposableHintsFr:
          type: array
          description: >
            Messages FR lorsque disposableIncomeMonthlyEur reste null malgré un bloc incomeTax
            (champs manquants, net bulletin vs après IR).
          items: { type: string }
  responses:
    Unauthorized:
      description: Clé API requise mais absente ou incorrecte
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: unauthorized
  examples:
    nounouDomicile:
      summary: Nounou à domicile (couple)
      value:
        household:
          taxYear: 2026
        brutInput:
          mode: nounou_domicile
          hourlyGrossEur: 12
          hoursPerMonth: 80
          employerShareOfGross: 0.42
        cmg:
          cumul: {}
          monthlyReferenceIncomeEur: 4000
          householdEffortRank: 1
          hourlyDeclaredGrossEur: 12
          heuresParMois: 80
