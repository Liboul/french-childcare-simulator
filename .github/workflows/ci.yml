name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format
        run: bun run format

      - name: Test
        run: bun run test

      - name: JSON Schema drift (GARDE-021 / GARDE-029)
        run: |
          bun run schema:scenario
          git diff --exit-code harness/scenario-input.schema.json

      - name: Skill ZIP layout (GARDE-031 / GARDE-035)
        run: |
          bun run package:harness-skill
          unzip -l dist/comparatif-modes-garde-fr-2026-skill.zip | grep -q 'SKILL.md'
          unzip -l dist/comparatif-modes-garde-fr-2026-skill.zip | grep -q 'INTAKE.md'
          unzip -l dist/comparatif-modes-garde-fr-2026-skill.zip | grep -q 'scenario-input.schema.json'
          unzip -l dist/comparatif-modes-garde-fr-2026-skill.zip | grep -q 'examples/'
          unzip -l dist/comparatif-modes-garde-fr-2026-skill.zip | grep -q 'scripts/simulate.mjs'
          unzip -l dist/comparatif-modes-garde-fr-2026-skill.zip | grep -q 'research/README.md'
          unzip -l dist/comparatif-modes-garde-fr-2026-skill.zip | grep -q 'research/DR-01'
          if unzip -l dist/comparatif-modes-garde-fr-2026-skill.zip | grep -q 'openapi.yaml'; then
            echo 'Harness skill ZIP must not contain openapi.yaml (GARDE-035)'
            exit 1
          fi
          TMP=$(mktemp -d)
          unzip -q dist/comparatif-modes-garde-fr-2026-skill.zip -d "$TMP"
          OUT=$(mktemp)
          node "$TMP/comparatif-modes-garde-fr-2026/scripts/simulate.mjs" docs/demo-scenarios/assistante-maternelle-2026.json >"$OUT"
          grep -q '"mode": "assistante_maternelle"' "$OUT"
