name: Demande de règle / barème
description: Étendre ou corriger une règle dans le pack `config/`
labels: ["enhancement", "regles"]
body:
  - type: markdown
    attributes:
      value: |
        Les changements de barème nécessitent des **sources primaires** ou un **DR-** validé (voir `docs/SPRINT_PLAN.md`).
  - type: textarea
    id: rule
    attributes:
      label: Règle ou paramètre souhaité
      description: Ex. plafond CMG tranche X, non-cumul Y, mode de garde Z
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Sources officielles (URLs + extraits si possible)
    validations:
      required: true
  - type: checkboxes
    id: research
    attributes:
      label: Recherche
      options:
        - label: J’ai déjà un livrable dans docs/research/ (DR-…) à lier
          required: false
